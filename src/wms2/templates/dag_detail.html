{% extends "base.html" %}
{% block title %}WMS2 — DAG {{ dag_id[:8] }}{% endblock %}
{% block head_scripts %}
<script src="/static/js/components/dag-detail.js"></script>
{% endblock %}
{% block content %}
<div x-data="dagDetail('{{ dag_id|e }}')" data-dag-id="{{ dag_id|e }}">

    <div x-show="error" class="error-banner" x-text="error"></div>
    <div x-show="loading && !dag" style="opacity:0.6">Loading...</div>

    <template x-if="dag">
        <div>
            <h1 style="font-size:1.3rem;">
                DAG
                <span x-html="statusBadge(dag.status)" style="margin-left:0.5rem;"></span>
            </h1>
            <p style="opacity:0.7; font-size:0.85rem; word-break:break-all;" x-text="dag.id"></p>

            <!-- DAG metadata -->
            <div class="section">
                <h3>DAG Info</h3>
                <dl class="detail-grid">
                    <dt>DAGMan Cluster ID</dt>
                    <dd x-text="dag.dagman_cluster_id || '—'"></dd>
                    <dt>Schedd</dt>
                    <dd x-text="dag.schedd_name || '—'"></dd>
                    <dt>Submit Dir</dt>
                    <dd x-text="dag.submit_dir || '—'" style="word-break:break-all;"></dd>
                    <dt>DAG File</dt>
                    <dd x-text="dag.dag_file_path || '—'" style="word-break:break-all;"></dd>
                    <template x-if="dag.rescue_dag_path">
                        <div style="display:contents;">
                            <dt>Rescue DAG</dt>
                            <dd x-text="dag.rescue_dag_path" style="word-break:break-all;"></dd>
                        </div>
                    </template>
                    <template x-if="dag.parent_dag_id">
                        <div style="display:contents;">
                            <dt>Parent DAG</dt>
                            <dd>
                                <a :href="'/ui/dags/' + encodeURIComponent(dag.parent_dag_id)"
                                   x-text="dag.parent_dag_id"></a>
                            </dd>
                        </div>
                    </template>
                    <template x-if="dag.stop_requested_at">
                        <div style="display:contents;">
                            <dt>Stop Requested</dt>
                            <dd x-text="fmtDateTime(dag.stop_requested_at)"></dd>
                            <dt>Stop Reason</dt>
                            <dd x-text="dag.stop_reason || '—'"></dd>
                        </div>
                    </template>
                    <dt>Created</dt>
                    <dd x-text="fmtDateTime(dag.created_at)"></dd>
                    <dt>Submitted</dt>
                    <dd x-text="fmtDateTime(dag.submitted_at)"></dd>
                    <template x-if="dag.completed_at">
                        <div style="display:contents;">
                            <dt>Completed</dt>
                            <dd x-text="fmtDateTime(dag.completed_at)"></dd>
                        </div>
                    </template>
                </dl>
            </div>

            <!-- Node counts with bar -->
            <div class="section">
                <h3>Node Counts</h3>
                <div class="node-bar">
                    <div class="segment seg-done" :style="'width:' + segPct(dag.nodes_done)"></div>
                    <div class="segment seg-running" :style="'width:' + segPct(dag.nodes_running)"></div>
                    <div class="segment seg-idle" :style="'width:' + segPct(dag.nodes_idle)"></div>
                    <div class="segment seg-failed" :style="'width:' + segPct(dag.nodes_failed)"></div>
                    <div class="segment seg-held" :style="'width:' + segPct(dag.nodes_held)"></div>
                </div>
                <div class="node-counts">
                    <span>Total: <strong x-text="dag.total_nodes || 0"></strong></span>
                    <span style="border-left:3px solid #22c55e;">Done: <strong x-text="dag.nodes_done || 0"></strong></span>
                    <span style="border-left:3px solid #3b82f6;">Running: <strong x-text="dag.nodes_running || 0"></strong></span>
                    <span style="border-left:3px solid #6b7280;">Idle: <strong x-text="dag.nodes_idle || 0"></strong></span>
                    <span style="border-left:3px solid #ef4444;">Failed: <strong x-text="dag.nodes_failed || 0"></strong></span>
                    <span style="border-left:3px solid #f59e0b;">Held: <strong x-text="dag.nodes_held || 0"></strong></span>
                </div>
                <template x-if="nodeCountsByType.length > 0">
                    <div style="font-size:0.85rem; opacity:0.7; margin-top:0.25rem;">
                        By type:
                        <template x-for="nc in nodeCountsByType" :key="nc.type">
                            <span x-text="nc.count + ' ' + nc.type" style="margin-right:0.75rem;"></span>
                        </template>
                    </div>
                </template>
            </div>

            <!-- Work unit progress -->
            <div class="section">
                <h3>Work Unit Progress</h3>
                <div>
                    <span x-text="wuCompleted"></span>
                    / <span x-text="dag.total_work_units || 0"></span> completed
                    (<span x-text="fmtPct(wuPct)"></span>)
                </div>
                <div class="progress-bar" style="max-width:500px;">
                    <div class="fill" :style="'width:' + wuPct + '%'"></div>
                </div>
            </div>

            <!-- HTCondor Jobs -->
            <template x-if="jobs.length > 0">
                <div class="section">
                    <h3>HTCondor Jobs <span style="font-size:0.85rem; opacity:0.6;" x-text="'(' + jobs.length + ')'"></span></h3>
                    <table class="timeline-table">
                        <thead>
                            <tr>
                                <th>Node</th>
                                <th>Status</th>
                                <th>Priority</th>
                                <th>Wall Time</th>
                                <th>Mem (MB)</th>
                                <th>ReqMem</th>
                                <th>CPU Eff</th>
                                <th>CPUs</th>
                                <th>Site</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="j in jobs" :key="j.name">
                                <tr>
                                    <td x-text="j.name" style="font-family:monospace; font-size:0.8rem;"></td>
                                    <td x-html="statusBadge(j.status)"></td>
                                    <td x-text="j.priority != null ? j.priority : '—'"></td>
                                    <td x-text="fmtWallTime(j.wall_time)"></td>
                                    <td x-text="j.memory_mb != null ? j.memory_mb : '—'"></td>
                                    <td x-text="j.request_memory || '—'"></td>
                                    <td x-text="j.cpu_efficiency != null ? j.cpu_efficiency + '%' : '—'"></td>
                                    <td x-text="j.cpus"></td>
                                    <td x-text="j.site || '—'"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- No jobs message for completed DAGs -->
            <template x-if="jobs.length === 0 && dag.status === 'completed'">
                <div class="section">
                    <h3>HTCondor Jobs</h3>
                    <p style="opacity:0.6;">DAG completed — no active HTCondor jobs in queue.</p>
                </div>
            </template>

            <!-- Performance Summary -->
            <template x-if="hasPerformance">
                <div class="section">
                    <h3>Performance Summary
                        <template x-if="performance.round_number != null">
                            <span style="font-size:0.85rem; opacity:0.6;">(Round <span x-text="performance.round_number"></span>)</span>
                        </template>
                    </h3>

                    <!-- Per-step CMSSW metrics -->
                    <template x-if="roundStepMetrics.length > 0">
                        <div style="margin-bottom:1rem;">
                            <h4 style="font-size:0.9rem; margin-bottom:0.25rem;">Step Metrics (averages across jobs)</h4>
                            <div style="overflow-x:auto;">
                                <table class="timeline-table">
                                    <thead>
                                        <tr>
                                            <th>Step</th>
                                            <th>Jobs</th>
                                            <th>CPU Eff %</th>
                                            <th>Peak RSS (MB)</th>
                                            <th>Peak VSize (MB)</th>
                                            <th>Wall Time (s)</th>
                                            <th>Time/Event (s)</th>
                                            <th>Throughput (ev/s)</th>
                                            <th>Read (MB)</th>
                                            <th>Write (MB)</th>
                                            <th>Events In</th>
                                            <th>Events Out</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="s in roundStepMetrics" :key="s.step">
                                            <tr>
                                                <td style="font-weight:600;" x-text="'Step ' + s.step"></td>
                                                <td x-text="s.num_jobs"></td>
                                                <td x-text="s.cpu_efficiency"></td>
                                                <td x-text="s.peak_rss_mb"></td>
                                                <td x-text="s.peak_vsize_mb"></td>
                                                <td x-text="s.wall_time"></td>
                                                <td x-text="s.time_per_event"></td>
                                                <td x-text="s.throughput"></td>
                                                <td x-text="s.read_mb"></td>
                                                <td x-text="s.write_mb"></td>
                                                <td x-text="s.events_processed"></td>
                                                <td x-text="s.events_written"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>

                    <!-- DAGMan metrics per merge group -->
                    <template x-if="performance.dag_metrics.length > 0">
                        <div>
                            <h4 style="font-size:0.9rem; margin-bottom:0.25rem;">DAGMan Metrics</h4>
                            <table class="timeline-table">
                                <thead>
                                    <tr>
                                        <th>Merge Group</th>
                                        <th>Duration</th>
                                        <th>Nodes</th>
                                        <th>Succeeded</th>
                                        <th>Failed</th>
                                        <th>Exit</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="m in performance.dag_metrics" :key="m.merge_group">
                                        <tr>
                                            <td style="font-family:monospace; font-size:0.8rem;" x-text="m.merge_group"></td>
                                            <td x-text="fmtWallTime(m.duration_sec)"></td>
                                            <td x-text="m.nodes"></td>
                                            <td x-text="m.nodes_succeeded"></td>
                                            <td>
                                                <span :style="m.nodes_failed > 0 ? 'color:#ef4444; font-weight:600;' : ''"
                                                      x-text="m.nodes_failed"></span>
                                            </td>
                                            <td>
                                                <span :style="m.exitcode !== 0 ? 'color:#ef4444; font-weight:600;' : ''"
                                                      x-text="m.exitcode"></span>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Node Event Log (from DAGMan node log files) -->
            <div class="section">
                <h3 style="display:flex; align-items:center; gap:0.5rem;">
                    Node Event Log
                    <span style="font-size:0.85rem; opacity:0.6;" x-text="'(' + nodeLog.length + ' events)'"></span>
                    <button class="btn btn-sm"
                            @click="showNodeLog = !showNodeLog"
                            x-text="showNodeLog ? 'Hide' : 'Show'"
                            style="margin-left:auto; font-size:0.75rem; padding:0.15rem 0.5rem;"></button>
                </h3>
                <template x-if="showNodeLog">
                    <div>
                        <template x-if="nodeLog.length === 0">
                            <p style="opacity:0.6;">No node log files found (log appears after DAG submission).</p>
                        </template>
                        <template x-if="nodeLog.length > 0">
                            <div>
                                <div style="margin-bottom:0.5rem;">
                                    <label style="font-size:0.85rem;">Filter by node:
                                        <select x-model="nodeFilter" style="font-size:0.85rem; padding:0.15rem 0.3rem;">
                                            <option value="">All nodes</option>
                                            <template x-for="n in nodeLogNodes" :key="n">
                                                <option :value="n" x-text="n"></option>
                                            </template>
                                        </select>
                                    </label>
                                    <span style="font-size:0.8rem; opacity:0.6; margin-left:0.5rem;"
                                          x-text="filteredNodeLog.length + ' events'"></span>
                                </div>
                                <table class="timeline-table">
                                    <thead>
                                        <tr>
                                            <th>Time</th>
                                            <th>Node</th>
                                            <th>Event</th>
                                            <th>Detail</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(ev, idx) in filteredNodeLog" :key="idx">
                                            <tr>
                                                <td style="white-space:nowrap; font-size:0.8rem;" x-text="fmtDateTime(ev.timestamp)"></td>
                                                <td style="font-family:monospace; font-size:0.8rem;" x-text="ev.node"></td>
                                                <td>
                                                    <span class="badge" :class="eventClass(ev)" x-text="ev.event"></span>
                                                </td>
                                                <td style="font-size:0.8rem; max-width:400px; overflow:hidden; text-overflow:ellipsis;"
                                                    x-text="ev.detail"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- History timeline -->
            <template x-if="history.length > 0">
                <div class="section">
                    <h3>History</h3>
                    <table class="timeline-table">
                        <thead>
                            <tr>
                                <th>Event</th>
                                <th>From</th>
                                <th>To</th>
                                <th>Done</th>
                                <th>Running</th>
                                <th>Failed</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="h in history" :key="h.id">
                                <tr>
                                    <td x-text="h.event_type"></td>
                                    <td x-html="h.from_status ? statusBadge(h.from_status) : '—'"></td>
                                    <td x-html="h.to_status ? statusBadge(h.to_status) : '—'"></td>
                                    <td x-text="h.nodes_done != null ? h.nodes_done : '—'"></td>
                                    <td x-text="h.nodes_running != null ? h.nodes_running : '—'"></td>
                                    <td x-text="h.nodes_failed != null ? h.nodes_failed : '—'"></td>
                                    <td x-text="fmtDateTime(h.created_at)"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- Back links -->
            <p>
                <a :href="'/ui/workflows/' + encodeURIComponent(dag.workflow_id)">&larr; Back to processing details</a>
            </p>
        </div>
    </template>
</div>
{% endblock %}
