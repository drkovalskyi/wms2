{% extends "base.html" %}
{% block title %}WMS2 — {{ request_name }}{% endblock %}
{% block head_scripts %}
<script src="/static/js/components/request-detail.js"></script>
{% endblock %}
{% block content %}
<div x-data="requestDetail('{{ request_name|e }}')" data-request-name="{{ request_name|e }}">

    <div x-show="error" class="error-banner" x-text="error"></div>
    <div x-show="loading && !request" style="opacity:0.6">Loading...</div>

    <template x-if="request">
        <div>
            <!-- Header -->
            <h1 style="font-size:1.3rem; word-break:break-all;">
                <span x-text="request.request_name"></span>
                <span x-html="statusBadge(request.status)" style="margin-left:0.5rem;"></span>
            </h1>

            <!-- Action buttons -->
            <template x-if="hasActions">
                <div class="action-buttons">
                    <template x-if="canStop">
                        <button class="outline" @click="showStopDialog = true" :disabled="actionLoading">Stop</button>
                    </template>
                    <template x-if="canRelease">
                        <button class="outline" @click="doRelease()" :disabled="actionLoading">Release</button>
                    </template>
                    <template x-if="canFail">
                        <button class="outline" style="--pico-color: #ef4444; --pico-border-color: #ef4444;"
                                @click="showFailDialog = true" :disabled="actionLoading">Fail</button>
                    </template>
                    <template x-if="canRestart">
                        <button class="outline" @click="showRestartDialog = true" :disabled="actionLoading">Restart</button>
                    </template>
                </div>
            </template>

            <!-- Stop dialog -->
            <dialog x-ref="stopDialog" :open="showStopDialog || undefined">
                <h3>Stop Request</h3>
                <p>Initiate a clean stop. Running jobs will finish; no new jobs will start.</p>
                <div class="form-group">
                    <label for="stop-reason">Reason</label>
                    <textarea id="stop-reason" x-model="stopReason" rows="2" style="width:100%;"></textarea>
                </div>
                <div class="dialog-actions">
                    <button class="outline" @click="showStopDialog = false">Cancel</button>
                    <button @click="doStop()" :disabled="actionLoading">Confirm Stop</button>
                </div>
            </dialog>

            <!-- Fail dialog -->
            <dialog x-ref="failDialog" :open="showFailDialog || undefined">
                <h3>Fail Request</h3>
                <p>This will kill the running DAG and mark the request as failed. This cannot be undone.</p>
                <div class="dialog-actions">
                    <button class="outline" @click="showFailDialog = false">Cancel</button>
                    <button style="--pico-background-color: #ef4444; --pico-border-color: #ef4444;"
                            @click="doFail()" :disabled="actionLoading">Confirm Fail</button>
                </div>
            </dialog>

            <!-- Restart dialog -->
            <dialog x-ref="restartDialog" :open="showRestartDialog || undefined">
                <h3>Restart Request</h3>
                <p>This will fail the current request and create a new one with an incremented version.
                   You will be redirected to the new request.</p>
                <div class="dialog-actions">
                    <button class="outline" @click="showRestartDialog = false">Cancel</button>
                    <button @click="doRestart()" :disabled="actionLoading">Confirm Restart</button>
                </div>
            </dialog>

            <template x-if="testFraction">
                <div class="banner-warning" style="background:#fef08a; border:2px solid #eab308; border-radius:4px; padding:0.5rem 0.75rem; margin-bottom:1rem; font-size:0.9rem; color:#713f12;">
                    <strong>TEST MODE</strong> — test_fraction=<span x-text="testFraction"></span>,
                    each job processes <span x-text="(testFraction * 100).toFixed(0)"></span>% of nominal events
                </div>
            </template>

            <!-- Request info -->
            <div class="section">
                <h3>Request Info</h3>
                <dl class="detail-grid">
                    <dt>Campaign</dt>
                    <dd x-text="request.campaign || '—'"></dd>
                    <dt>Priority</dt>
                    <dd x-text="request.priority"></dd>
                    <dt>Requestor</dt>
                    <dd x-text="request.requestor || '—'"></dd>
                    <dt>Urgent</dt>
                    <dd x-text="request.urgent ? 'Yes' : 'No'"></dd>
                    <dt>Adaptive</dt>
                    <dd x-text="request.adaptive ? 'Yes' : 'No'"></dd>
                    <dt>Type</dt>
                    <dd x-text="(request.request_data && request.request_data.RequestType) || '—'"></dd>
                    <template x-if="request.input_dataset && !(request.request_data && request.request_data._is_gen)">
                        <div style="display:contents;">
                            <dt>Input Dataset</dt>
                            <dd x-text="request.input_dataset" style="word-break:break-all;"></dd>
                        </div>
                    </template>
                    <dt>Created</dt>
                    <dd x-text="fmtDateTime(request.created_at)"></dd>
                    <dt>Updated</dt>
                    <dd x-text="fmtDateTime(request.updated_at)"></dd>
                    <dt>Cleanup Policy</dt>
                    <dd x-text="request.cleanup_policy || '—'"></dd>
                </dl>
            </div>

            <!-- Processing progress -->
            <template x-if="hasWorkflow">
                <div class="section">
                    <h3>Processing Progress</h3>
                    <dl class="detail-grid">
                        <dt>Status</dt>
                        <dd x-html="statusBadge(workflow.status)"></dd>
                        <dt>Round</dt>
                        <dd x-text="workflow.current_round != null ? workflow.current_round : '—'"></dd>
                        <dt>Events Produced</dt>
                        <dd>
                            <span x-text="fmtNum(workflow.events_produced)"></span>
                            / <span x-text="fmtNum(workflow.target_events)"></span>
                        </dd>
                        <dt>Progress</dt>
                        <dd x-text="fmtPct(progressPct)"></dd>
                    </dl>
                    <div class="progress-bar" style="max-width:500px;">
                        <div class="fill" :style="'width:' + Math.min(100, progressPct) + '%'"></div>
                    </div>
                    <div style="font-size:0.85rem; opacity:0.7; margin-top:0.25rem;">
                        Nodes: <span x-text="fmtNum(workflow.nodes_done)"></span> done,
                        <span x-text="fmtNum(workflow.nodes_running)"></span> running,
                        <span x-text="fmtNum(workflow.nodes_queued)"></span> queued,
                        <span x-text="fmtNum(workflow.nodes_failed)"></span> failed
                    </div>
                    <p style="margin-top:0.5rem;">
                        <a :href="'/ui/workflows/' + encodeURIComponent(workflow.id)">View processing details &rarr;</a>
                    </p>
                </div>
            </template>
            <template x-if="!hasWorkflow">
                <div class="section">
                    <h3>Processing</h3>
                    <p style="opacity:0.6">Not started yet.</p>
                </div>
            </template>

            <!-- DAG node counts -->
            <template x-if="hasDAG">
                <div class="section">
                    <h3>DAG Details</h3>
                    <dl class="detail-grid">
                        <dt>Status</dt>
                        <dd x-html="statusBadge(dag.status)"></dd>
                        <dt>DAGMan Cluster</dt>
                        <dd x-text="dag.dagman_cluster_id || '—'"></dd>
                        <dt>Work Units <span x-show="workflow && workflow.current_round != null" style="opacity:0.6; font-weight:normal;">(Round <span x-text="workflow.current_round"></span>)</span></dt>
                        <dd>
                            <span x-text="Array.isArray(dag.completed_work_units) ? dag.completed_work_units.length : (dag.completed_work_units || 0)"></span>
                            / <span x-text="dag.total_work_units || 0"></span> completed
                        </dd>
                    </dl>
                    <div class="node-counts" style="margin-top:0.5rem;">
                        <span>Total: <strong x-text="dag.total_nodes || 0"></strong></span>
                        <span>Done: <strong x-text="dag.nodes_done || 0"></strong></span>
                        <span>Running: <strong x-text="dag.nodes_running || 0"></strong></span>
                        <span>Idle: <strong x-text="dag.nodes_idle || 0"></strong></span>
                        <span>Failed: <strong x-text="dag.nodes_failed || 0"></strong></span>
                        <span>Held: <strong x-text="dag.nodes_held || 0"></strong></span>
                    </div>
                    <p style="margin-top:0.5rem;">
                        <a :href="'/ui/dags/' + encodeURIComponent(dag.id)">View DAG details &rarr;</a>
                    </p>
                </div>
            </template>

            <!-- Step metrics -->
            <template x-if="stepMetrics.length > 0">
                <div class="section">
                    <h3>Step Metrics</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Step</th>
                                <th>Avg CPU Eff</th>
                                <th>Avg Memory (MB)</th>
                                <th>Avg Time/Event (s)</th>
                                <th>Avg Throughput</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="m in stepMetrics" :key="m.step">
                                <tr>
                                    <td x-text="m.step"></td>
                                    <td x-text="m.avg_cpu_efficiency != null ? fmtPct(m.avg_cpu_efficiency) : '—'"></td>
                                    <td x-text="m.avg_peak_rss != null ? fmtNum(Math.round(m.avg_peak_rss)) : '—'"></td>
                                    <td x-text="m.avg_time_per_event != null ? Number(m.avg_time_per_event).toFixed(2) : '—'"></td>
                                    <td x-text="m.avg_throughput != null ? Number(m.avg_throughput).toFixed(1) : '—'"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- Errors -->
            <template x-if="hasErrors">
                <div class="section">
                    <h3>Errors</h3>
                    <p>Total failures: <strong x-text="errors.total_failures || 0"></strong></p>
                    <template x-if="errors.site_errors && errors.site_errors.length > 0">
                        <table>
                            <thead><tr><th>Site</th><th>Failures</th><th>Banned</th></tr></thead>
                            <tbody>
                                <template x-for="se in errors.site_errors" :key="se.site">
                                    <tr>
                                        <td x-text="se.site"></td>
                                        <td x-text="se.failures"></td>
                                        <td x-text="se.banned ? 'Yes' : 'No'"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>
                </div>
            </template>

            <!-- Status history -->
            <template x-if="transitions.length > 0">
                <div class="section">
                    <h3>Status History</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>From</th>
                                <th>To</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(t, i) in transitions" :key="i">
                                <tr>
                                    <td x-html="statusBadge(t.from)"></td>
                                    <td x-html="statusBadge(t.to)"></td>
                                    <td x-text="fmtDateTime(t.timestamp)"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- Back link -->
            <p><a href="/ui/requests">&larr; All Requests</a></p>
        </div>
    </template>
</div>
{% endblock %}
