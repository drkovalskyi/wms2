{% extends "base.html" %}
{% block title %}WMS2 — Processing {{ workflow_id[:8] }}{% endblock %}
{% block head_scripts %}
<script src="/static/js/components/workflow-detail.js"></script>
{% endblock %}
{% block content %}
<div x-data="workflowDetail('{{ workflow_id|e }}')" data-workflow-id="{{ workflow_id|e }}">

    <div x-show="error" class="error-banner" x-text="error"></div>
    <div x-show="loading && !workflow" style="opacity:0.6">Loading...</div>

    <template x-if="workflow">
        <div>
            <h1 style="font-size:1.3rem;">
                Processing Details
                <span x-html="statusBadge(workflow.status)" style="margin-left:0.5rem;"></span>
            </h1>
            <p style="opacity:0.7; font-size:0.85rem; word-break:break-all;" x-text="workflow.id"></p>

            <template x-if="testFraction">
                <div class="banner-warning" style="background:#fef08a; border:2px solid #eab308; border-radius:4px; padding:0.5rem 0.75rem; margin-bottom:1rem; font-size:0.9rem; color:#713f12;">
                    <strong>TEST MODE</strong> — test_fraction=<span x-text="testFraction"></span>,
                    each job processes <span x-text="(testFraction * 100).toFixed(0)"></span>% of nominal events
                </div>
            </template>

            <div class="section">
                <h3>Processing Info</h3>
                <dl class="detail-grid">
                    <dt>Request</dt>
                    <dd>
                        <a :href="reqmgrUrl" target="_blank" rel="noopener"
                           x-text="workflow.request_name" style="word-break:break-all;"
                           title="Open in ReqMgr2"></a>
                        <a :href="'/ui/requests/' + encodeURIComponent(workflow.request_name)"
                           style="margin-left:0.5rem; font-size:0.8rem;">(WMS2)</a>
                    </dd>
                    <dt>Type</dt>
                    <dd x-text="configData.request_type || '—'"></dd>
                    <template x-if="!isGen">
                        <div style="display:contents;">
                            <dt>Input Dataset</dt>
                            <dd :title="workflow.input_dataset" x-text="fmtMidTruncate(workflow.input_dataset, 100)"></dd>
                        </div>
                    </template>
                    <template x-for="pu in pileupDatasets" :key="pu.dataset">
                        <div style="display:contents;">
                            <dt x-text="pu.type"></dt>
                            <dd :title="pu.dataset" x-text="fmtMidTruncate(pu.dataset, 100)"></dd>
                        </div>
                    </template>
                    <dt>Splitting Algorithm</dt>
                    <dd x-text="workflow.splitting_algo || '—'"></dd>
                    <dt>Current Round</dt>
                    <dd x-text="workflow.current_round != null ? workflow.current_round : '—'"></dd>
                    <dt>Created</dt>
                    <dd x-text="fmtDateTime(workflow.created_at)"></dd>
                    <dt>Updated</dt>
                    <dd x-text="fmtDateTime(workflow.updated_at)"></dd>
                </dl>
            </div>

            <!-- Steps -->
            <template x-if="stepsInfo.length > 0">
                <div class="section">
                    <h3>Steps</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>CMSSW</th>
                                <th>Global Tag</th>
                                <th>Arch</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="s in stepsInfo" :key="s.index">
                                <tr>
                                    <td x-text="s.index"></td>
                                    <td x-text="s.name"></td>
                                    <td x-text="s.cmssw"></td>
                                    <td x-text="s.global_tag"></td>
                                    <td x-text="s.scram_arch"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- Splitting params -->
            <template x-if="Object.keys(splittingDisplay).length > 0">
                <div class="section">
                    <h3>Splitting Parameters</h3>
                    <dl class="detail-grid">
                        <template x-for="[key, val] in Object.entries(splittingDisplay)" :key="key">
                            <div>
                                <dt x-text="key"></dt>
                                <dd>
                                    <template x-if="key === 'effective_events_per_job'">
                                        <span><strong x-text="val"></strong> <span style="opacity:0.6">(nominal &times; test_fraction)</span></span>
                                    </template>
                                    <template x-if="key !== 'effective_events_per_job'">
                                        <span x-text="val"></span>
                                    </template>
                                </dd>
                            </div>
                        </template>
                    </dl>
                </div>
            </template>

            <!-- Adaptive optimization — current result summary -->
            <template x-if="adaptiveInfo">
                <div class="section">
                    <h3>Adaptive Optimization</h3>
                    <dl class="detail-grid">
                        <dt>Memory Source</dt>
                        <dd x-text="adaptiveInfo.memory_source || adaptiveInfo.mode || '—'"></dd>
                        <dt>Request Memory</dt>
                        <dd><span x-text="fmtNum(adaptiveInfo.original_memory)"></span> MB</dd>
                        <dt>Tuned Memory</dt>
                        <dd>
                            <strong x-text="fmtNum(adaptiveInfo.tuned_memory)"></strong> MB
                            <template x-if="adaptiveInfo.original_memory && adaptiveInfo.tuned_memory">
                                <span style="margin-left:0.25rem;"
                                      :style="adaptiveInfo.tuned_memory < adaptiveInfo.original_memory ? 'color:#16a34a' : 'color:#dc2626'"
                                      x-text="'(' + (adaptiveInfo.tuned_memory < adaptiveInfo.original_memory ? '' : '+') + (((adaptiveInfo.tuned_memory - adaptiveInfo.original_memory) / adaptiveInfo.original_memory) * 100).toFixed(0) + '%)'"></span>
                            </template>
                        </dd>
                        <dt>Request Threads</dt>
                        <dd x-text="adaptiveInfo.original_nthreads"></dd>
                        <dt>Tuned Threads</dt>
                        <dd>
                            <strong x-text="adaptiveInfo.tuned_nthreads"></strong>
                            <template x-if="adaptiveInfo.original_nthreads !== adaptiveInfo.tuned_nthreads">
                                <span style="margin-left:0.25rem;" x-text="'(' + (adaptiveInfo.tuned_nthreads - adaptiveInfo.original_nthreads) + ')'"></span>
                            </template>
                        </dd>
                        <template x-if="adaptiveInfo.peak_rss">
                            <div style="display:contents;">
                                <dt>Measured Peak RSS</dt>
                                <dd><span x-text="fmtNum(adaptiveInfo.peak_rss)"></span> MB</dd>
                            </div>
                        </template>
                        <template x-if="adaptiveInfo.cpu_eff != null">
                            <div style="display:contents;">
                                <dt>Weighted CPU Eff</dt>
                                <dd x-text="fmtPct(adaptiveInfo.cpu_eff * 100)"></dd>
                            </div>
                        </template>
                        <dt>Memory Source</dt>
                        <dd x-text="adaptiveInfo.memory_source || '—'"></dd>
                    </dl>

                    <!-- Per-step adaptive detail -->
                    <template x-if="adaptiveInfo.per_step">
                        <div style="margin-top:0.75rem;">
                            <h4 style="font-size:0.9rem; margin-bottom:0.25rem;">Per-Step Tuning</h4>
                            <table style="font-size:0.85rem;">
                                <thead>
                                    <tr>
                                        <th>Step</th>
                                        <th>CPU Eff</th>
                                        <th>Eff Cores</th>
                                        <th>Tuned Threads</th>
                                        <th>Parallel</th>
                                        <th>Overcommit</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="[sn, sd] in Object.entries(adaptiveInfo.per_step).sort((a,b) => Number(a[0]) - Number(b[0]))" :key="sn">
                                        <tr>
                                            <td x-text="'Step ' + sn"></td>
                                            <td x-text="sd.cpu_eff != null ? fmtPct(sd.cpu_eff * 100) : '—'"></td>
                                            <td x-text="sd.effective_cores != null ? sd.effective_cores.toFixed(1) : '—'"></td>
                                            <td x-text="sd.tuned_nthreads || '—'"></td>
                                            <td x-text="sd.n_parallel || 1"></td>
                                            <td x-text="sd.overcommit_applied ? 'yes' : 'no'"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Progress -->
            <div class="section">
                <h3>Events Progress</h3>
                <dl class="detail-grid">
                    <dt>Events Produced</dt>
                    <dd>
                        <span x-text="fmtNum(workflow.events_produced)"></span>
                        / <span x-text="fmtNum(workflow.target_events)"></span>
                    </dd>
                    <template x-if="!isGen">
                        <div style="display:contents;">
                            <dt>Files Processed</dt>
                            <dd>
                                <span x-text="fmtNum(workflow.files_processed)"></span>
                                / <span x-text="fmtNum(workflow.total_input_files)"></span>
                            </dd>
                        </div>
                    </template>
                    <dt>Progress</dt>
                    <dd x-text="fmtPct(progressPct)"></dd>
                </dl>
                <div class="progress-bar" style="max-width:500px;">
                    <div class="fill" :style="'width:' + Math.min(100, progressPct) + '%'"></div>
                </div>
                <div style="font-size:0.85rem; opacity:0.7; margin-top:0.25rem;">
                    Nodes: <span x-text="fmtNum(workflow.nodes_done)"></span> done,
                    <span x-text="fmtNum(workflow.nodes_running)"></span> running,
                    <span x-text="fmtNum(workflow.nodes_queued)"></span> queued,
                    <span x-text="fmtNum(workflow.nodes_failed)"></span> failed
                </div>
            </div>

            <!-- Step metrics with round selector -->
            <template x-if="stepMetrics.length > 0 || metricsRoundOptions.length > 0">
                <div class="section">
                    <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:0.5rem;">
                        <h3 style="margin:0;">Step Metrics</h3>
                        <template x-if="metricsRoundOptions.length > 1">
                            <select x-model="selectedMetricsRound"
                                    style="font-size:0.85rem; padding:0.15rem 0.4rem; border-radius:3px; border:1px solid var(--pico-muted-border-color);">
                                <option value="all">All Rounds</option>
                                <template x-for="rk in metricsRoundOptions" :key="rk">
                                    <option :value="rk" x-text="'Round ' + rk"></option>
                                </template>
                            </select>
                        </template>
                    </div>
                    <template x-if="stepMetrics.length > 0">
                        <table>
                            <thead>
                                <tr>
                                    <th>Step</th>
                                    <th>Avg CPU Eff</th>
                                    <th>Avg Memory (MB)</th>
                                    <th>Avg Time/Event (s)</th>
                                    <th>Avg Throughput</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="m in stepMetrics" :key="m.step">
                                    <tr>
                                        <td x-text="m.step"></td>
                                        <td x-text="m.avg_cpu_efficiency != null ? fmtPct(m.avg_cpu_efficiency) : '—'"></td>
                                        <td x-text="m.avg_peak_rss != null ? fmtNum(Math.round(m.avg_peak_rss)) : '—'"></td>
                                        <td x-text="m.avg_time_per_event != null ? Number(m.avg_time_per_event).toFixed(2) : '—'"></td>
                                        <td x-text="m.avg_throughput != null ? Number(m.avg_throughput).toFixed(1) : '—'"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>
                    <template x-if="stepMetrics.length === 0">
                        <p style="opacity:0.6; font-size:0.85rem;">No metrics for this round.</p>
                    </template>
                </div>
            </template>

            <!-- Round Performance History (from step_metrics.rounds) -->
            <template x-if="roundOptimizationHistory.length > 0">
                <div class="section">
                    <h3>Round Performance</h3>
                    <div style="overflow-x:auto;">
                    <table style="font-size:0.85rem;">
                        <thead>
                            <tr>
                                <th>Round</th>
                                <th>WUs</th>
                                <th>Done</th>
                                <th>Failed</th>
                                <th>Memory (MB)</th>
                                <th>Threads</th>
                                <th>Avg CPU Eff</th>
                                <th>Peak RSS (MB)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="r in roundOptimizationHistory" :key="r.round">
                                <tr>
                                    <td>
                                        <a href="#" @click.prevent="selectedMetricsRound = String(r.round)"
                                           x-text="r.round" title="Click to filter Step Metrics"></a>
                                    </td>
                                    <td x-text="r.work_units"></td>
                                    <td x-text="r.nodes_done"></td>
                                    <td x-text="r.nodes_failed"></td>
                                    <td x-text="fmtNum(r.memory_used)"></td>
                                    <td x-text="r.threads_used"></td>
                                    <td x-text="r.cpu_eff != null ? fmtPct(r.cpu_eff * 100) : '—'"></td>
                                    <td x-text="r.peak_rss ? fmtNum(r.peak_rss) : '—'"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                    </div>
                </div>
            </template>

            <!-- DAG History (all DAGs in chronological order) -->
            <template x-if="allDags.length > 0">
                <div class="section">
                    <h3>DAG History</h3>
                    <table style="font-size:0.85rem;">
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>Work Units</th>
                                <th>Nodes Done</th>
                                <th>Nodes Failed</th>
                                <th>Created</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="d in [...allDags].reverse()" :key="d.id">
                                <tr>
                                    <td x-html="statusBadge(d.status)"></td>
                                    <td x-text="d.total_work_units || 0"></td>
                                    <td x-text="d.nodes_done || 0"></td>
                                    <td x-text="d.nodes_failed || 0"></td>
                                    <td x-text="fmtDateTime(d.created_at)"></td>
                                    <td><a :href="'/ui/dags/' + encodeURIComponent(d.id)">Details &rarr;</a></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- Output Datasets -->
            <template x-if="outputDatasets.length > 0">
                <div class="section">
                    <h3>Output Datasets</h3>
                    <template x-for="ds in outputDatasets" :key="ds.dataset_name">
                        <div style="margin-bottom:1rem; padding:0.75rem; border:1px solid var(--pico-muted-border-color); border-radius:4px;">
                            <strong x-text="ds.dataset_name" style="word-break:break-all;"></strong>
                            <dl class="detail-grid" style="margin-top:0.5rem;">
                                <dt>Data Tier</dt>
                                <dd x-text="ds.data_tier || '—'"></dd>
                                <dt>Output Path</dt>
                                <dd x-text="ds.output_path || '—'" style="word-break:break-all; font-size:0.85rem;"></dd>
                                <dt>Events</dt>
                                <dd x-text="ds.event_count > 0 ? fmtNum(ds.event_count) : '—'"></dd>
                                <dt>Files</dt>
                                <dd><span x-text="ds.file_count"></span> .root files</dd>
                                <dt>Total Size</dt>
                                <dd x-text="ds.total_size_mb > 0 ? ds.total_size_mb + ' MB' : '—'"></dd>
                            </dl>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Back links -->
            <p>
                <a :href="'/ui/requests/' + encodeURIComponent(workflow.request_name)">&larr; Back to request</a>
            </p>
        </div>
    </template>
</div>
{% endblock %}
